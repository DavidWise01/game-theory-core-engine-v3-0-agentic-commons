<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>v3.0 Agentic Commons</title><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{color-scheme:dark;--bg:#050711;--panel:#0f172a;--text:#e5e7eb;--muted:#9ca3af;--line:#2e3a55;--carbon:#93c5fd;--silicon:#86efac;--witness:#fef08a;--shadow:#c084fc;--hot:#f97316}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 5%,rgba(147,197,253,.18),transparent 28%),radial-gradient(circle at 80% 5%,rgba(134,239,172,.16),transparent 26%),linear-gradient(180deg,#080b18,var(--bg));color:var(--text);font-family:Inter,system-ui,Segoe UI,sans-serif}
header{padding:22px;border-bottom:1px solid var(--line);background:rgba(5,7,17,.72);position:sticky;top:0;z-index:5;backdrop-filter:blur(14px)}h1{margin:0 0 6px;font-size:24px}.sub{color:var(--muted);font-size:14px}
main{display:grid;grid-template-columns:320px 1fr 390px;gap:16px;padding:16px}section{background:rgba(15,23,42,.9);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.28)}button{width:100%;padding:11px;border-radius:13px;border:1px solid var(--line);background:linear-gradient(180deg,#1f2d48,#111827);color:var(--text);cursor:pointer;margin-top:10px;font-weight:800}button:hover{border-color:white}h2{font-size:16px;margin:0 0 12px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.card{background:linear-gradient(180deg,#172033,#101827);border:1px solid var(--line);border-radius:14px;padding:12px}.metric{font-size:22px;font-weight:900}.muted{color:var(--muted);font-size:13px}
.agentWrap{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.court h3{text-align:center;color:var(--muted);font-size:14px;margin:0 0 10px}.agentGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.agent{aspect-ratio:1;border-radius:12px;border:1px solid rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;text-align:center;font-size:10px;font-weight:800;cursor:pointer;transition:.12s ease;position:relative;overflow:hidden}.agent:hover{transform:scale(1.05);filter:brightness(1.2)}.Carbon{background:rgba(147,197,253,.26)}.Silicon{background:rgba(134,239,172,.24)}.Witness{background:rgba(254,240,138,.20)}.affirm{outline:2px solid var(--carbon)}.oppose{outline:2px solid var(--shadow)}.synthesize{outline:2px solid var(--silicon)}.witness{outline:2px solid var(--witness)}.active{box-shadow:0 0 22px rgba(249,115,22,.9);outline:4px solid var(--hot)}
pre{white-space:pre-wrap;background:#070914;border:1px solid var(--line);padding:12px;border-radius:12px;max-height:360px;overflow:auto;font-size:12px}.argumentList{max-height:360px;overflow:auto;border:1px solid var(--line);border-radius:12px;background:#070914}.arg{padding:10px;border-bottom:1px solid var(--line);font-size:12px}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:2px 7px;margin:2px;font-size:11px;color:var(--muted)}
@media(max-width:1200px){main{grid-template-columns:1fr}.agentWrap{grid-template-columns:1fr}}
</style></head>
<body><header><h1>Game Theory Core Engine v3.0</h1><div class="sub">Agentic Commons: 81 agents, 54 debaters, 27 witnesses, one wiki record.</div></header>
<main><section><h2>Controls</h2><button onclick="runDebate()">Run First Debate</button><button onclick="pulseAgents()">Pulse 81 Agents</button><button onclick="resetRuntime()">Reset</button><h2 style="margin-top:20px">First Question</h2><pre id="topic"></pre><div><span class="badge">81 agents</span><span class="badge">54 debaters</span><span class="badge">27 witnesses</span><span class="badge">Commons wiki</span></div></section>
<section><h2>Commons Agent Board</h2><div class="metrics"><div class="card"><div class="metric" id="agentCount">81</div><div class="muted">Agents</div></div><div class="card"><div class="metric" id="debaterCount">54</div><div class="muted">Debaters</div></div><div class="card"><div class="metric" id="witnessCount">27</div><div class="muted">Witnesses</div></div><div class="card"><div class="metric" id="result">idle</div><div class="muted">Commons result</div></div></div><div class="agentWrap" id="agentWrap"></div><h2 style="margin-top:16px">Arguments</h2><div class="argumentList" id="arguments"></div></section>
<section><h2>Commons Wiki Record</h2><pre id="commons"></pre><h2>Selected Agent</h2><pre id="selected"></pre></section></main>
<script>
const TOPIC = "Should intent outweigh probability when predicting the next token?";
const ROLES=[["King","governance"],["Queen","optimization"],["Jester","assumption_attack"],["Castle","defense"],["Rook","linear_pressure"],["Bishop","inference"],["Knight","edge_case"],["Pawn","sacrifice_path"],["Witness","observation"]];
const COURTS=["Carbon","Silicon","Witness"], RANKS=["Light","Shadow","Neutral"];
let agents=[], args=[], scores=[], page=null, selectedAgent=null;
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return Math.abs(h)}
function chooseSide(a){const h=hash(a.id+TOPIC), b=h%4;if(a.court==="Witness")a.side="witness";else if(b===0)a.side="affirm";else if(b===1)a.side="oppose";else a.side="synthesize";a.confidence=.55+((h%40)/100);}
function resetRuntime(){agents=[];args=[];scores=[];page=null;selectedAgent=null;let counter=1;for(const court of COURTS)for(const rank of RANKS)for(let i=0;i<ROLES.length;i++){const [role,archetype]=ROLES[i], base=(i+1)/9;const id=`A${String(counter).padStart(2,"0")}`;let agent={id,court,rank,role,archetype,k:.75+base*.35,q:.80+(1-Math.abs(.5-base))*.32,v:.78+base*.42,side:"unassigned",confidence:0};chooseSide(agent);agents.push(agent);counter++;}document.getElementById("topic").textContent=TOPIC;render();}
function claim(a){let stance,c;if(a.side==="affirm"){stance="Intent should outweigh probability when alignment is the core task.";c=`${a.role} affirms: intent preserves direction better than raw likelihood.`}else if(a.side==="oppose"){stance="Probability should remain the measurable baseline.";c=`${a.role} opposes: intent without probability can become projection.`}else if(a.side==="synthesize"){stance="Intent should modulate probability, not replace it.";c=`${a.role} synthesizes: probability supplies options, intent selects trajectory.`}else{stance="Witness records coherence and contradiction.";c=`${a.role} witnesses: evaluate without modifying the claim.`}return {agent_id:a.id,court:a.court,rank:a.rank,role:a.role,side:a.side,confidence:a.confidence,stance,claim:c,kqv:{K:a.k,Q:a.q,V:a.v}};}
function scoreArg(w,arg){const coherence=Math.min(1,(arg.kqv.K+arg.kqv.Q+arg.kqv.V)/3), confidence=arg.confidence, novelty=.45+(arg.claim.length%35)/100, intent_fidelity=arg.side==="affirm"||arg.side==="synthesize"?.80:.68;return {witness_id:w.id,target_agent_id:arg.agent_id,coherence,confidence,novelty,intent_fidelity,score:coherence*.30+confidence*.25+novelty*.15+intent_fidelity*.30};}
function runDebate(){const debaters=agents.filter(a=>a.court==="Carbon"||a.court==="Silicon"), witnesses=agents.filter(a=>a.court==="Witness");args=debaters.map(claim);scores=[];for(const w of witnesses)for(const a of args.slice(0,18))scores.push(scoreArg(w,a));const counts={affirm:0,oppose:0,synthesize:0,witness:27};for(const a of args)counts[a.side]++;const avg=scores.reduce((a,s)=>a+s.score,0)/scores.length;let result="no_clear_consensus";if(counts.synthesize>=counts.affirm&&counts.synthesize>=counts.oppose)result="synthesis_preferred";else if(counts.affirm>counts.oppose&&avg>=.70)result="intent_priority_supported";else if(counts.oppose>counts.affirm)result="probability_baseline_supported";const proposer=[...agents].sort((a,b)=>b.q-a.q)[0];page={title:"Commons Record: Intent vs Probability",topic:TOPIC,proposer:{agent_id:proposer.id,court:proposer.court,rank:proposer.rank,role:proposer.role,proposal:`Proposed topic: ${TOPIC}`},summary:{argument_count:args.length,witness_score_count:scores.length,side_counts:counts,average_witness_score:avg,commons_result:result,top_claims:[...args].sort((a,b)=>b.confidence-a.confidence).slice(0,5)},arguments:args.slice(0,12)};render();}
function pulseAgents(){let i=0;const timer=setInterval(()=>{selectedAgent=agents[i];render();i++;if(i>=81)clearInterval(timer)},55)}
function renderAgents(){const wrap=document.getElementById("agentWrap");wrap.innerHTML="";for(const court of COURTS){const div=document.createElement("div");div.className="court";div.innerHTML=`<h3>${court} Court</h3>`;const grid=document.createElement("div");grid.className="agentGrid";for(const a of agents.filter(x=>x.court===court)){const d=document.createElement("div");d.className=`agent ${a.court} ${a.side} ${selectedAgent&&selectedAgent.id===a.id?"active":""}`;d.innerHTML=`<span>${a.id}<br>${a.rank}<br>${a.role}<br>${a.side}</span>`;d.onclick=()=>{selectedAgent=a;render()};grid.appendChild(d)}div.appendChild(grid);wrap.appendChild(div)}}
function renderArgs(){const root=document.getElementById("arguments");root.innerHTML="";for(const a of args){const div=document.createElement("div");div.className="arg";div.innerHTML=`<strong>${a.agent_id} ${a.court} ${a.role}</strong> <span class="badge">${a.side}</span><br>${a.claim}`;root.appendChild(div)}}
function render(){document.getElementById("agentCount").textContent=agents.length;document.getElementById("debaterCount").textContent=agents.filter(a=>a.court==="Carbon"||a.court==="Silicon").length;document.getElementById("witnessCount").textContent=agents.filter(a=>a.court==="Witness").length;document.getElementById("result").textContent=page?page.summary.commons_result:"idle";renderAgents();renderArgs();document.getElementById("commons").textContent=JSON.stringify(page||{status:"not run",topic:TOPIC},null,2);document.getElementById("selected").textContent=JSON.stringify(selectedAgent||agents[0],null,2);}
resetRuntime();
</script></body></html>
